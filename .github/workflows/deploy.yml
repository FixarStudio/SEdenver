name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: se-denver-construction/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: se-denver-construction

      - name: Build
        run: npm run build
        working-directory: se-denver-construction

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: se-denver-construction/dist

      - uses: actions/deploy-pages@v4
        id: deployment
